<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Orbit Playlist</title>
  <link rel="stylesheet" href="musiclist.css">
</head>

<body>

<div class="playlist">
  <div class="circle">
    <img src="orbit1.png" class="orbit-logo">


    <button class="dot" data-index="0" data-src="I see God in you-clip1.wav"></button>
    <button class="dot" data-index="1" data-src="You’re Allowed to Rest-clip2.wav"></button>
    <button class="dot" data-index="2" data-src="The Mind Lies, The Heart Knows-clip3.wav"></button>
    <button class="dot" data-index="3" data-src="Tell Them While They’re Here-clip4.wav"></button>
    <button class="dot" data-index="4" data-src="I Forgive You, I Forgive Me-clip5.wav"></button>
    <button class="dot" data-index="5" data-src="The Inner Child Still Matters-clip6.wav"></button>
    <button class="dot" data-index="6" data-src="You’re Not Too Late-clip7.wav"></button>
    <button class="dot" data-index="7" data-src="Your Heart Is Still Good-clip8.wav"></button>
    <button class="dot" data-index="8" data-src="Thank You for Carrying Me-clip9.wav"></button>
    <button class="dot" data-index="9" data-src="Let Go of What’s Killing You-clip10.wav"></button>
    <button class="dot" data-index="10" data-src="I’m Proud of You-clip11.wav"></button>
    <button class="dot" data-index="11" data-src="We’re All Just Trying to Come Home-clip12.wav"></button>

  </div>

 <div class="now-playing">
  <div id="track-label">Track 1</div>
  <audio id="player" controls></audio>
</div>

</div>

<script src="listjs.js"></script>
</body>
</html>
